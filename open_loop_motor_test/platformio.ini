[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial monitor baud rate — must match Serial.begin(115200) in your code
monitor_speed = 115200

; Set your actual COM port — check Windows Device Manager for the number
upload_port   = COM3

; Upload baud rate — 460800 is fast and reliable for ESP32
upload_speed  = 115200

; Wait 2 seconds before attempting upload — allows auto-reset to complete
board_upload.before_reset = default_reset