; PlatformIO configuration for ESP32 serial bridge firmware
; ──────────────────────────────────────────────────────────
; This is a MUCH simpler setup than the micro-ROS firmware.
; No micro_ros_platformio library needed — just plain Arduino ESP32.
;
; Usage:
;   Build:   pio run -e esp32
;   Upload:  pio run -e esp32 --target upload
;   Monitor: pio device monitor -e esp32

[platformio]
default_envs = esp32

[env:esp32]
platform  = espressif32
board     = nodemcu-32s        ; ESP32 DevKit C (WROOM-32) — same board as before
framework = arduino

; Serial port — change if your ESP32 is on a different port
upload_port   = /dev/ttyUSB0
monitor_port  = /dev/ttyUSB0
upload_speed  = 115200
monitor_speed = 115200         ; Must match BAUDRATE in firmware (115200)

; No external libraries needed — everything is in Arduino ESP32 core
; ledcSetup, ledcWrite, attachInterrupt are all built-in
